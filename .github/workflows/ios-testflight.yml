name: ios-testflight

# Builds the iOS app + uploads to TestFlight on every push of a tag
# matching `ios-v*` (e.g. `ios-v0.1.0`). Also runnable manually via
# workflow_dispatch.
#
# Uses the same `xcodebuild archive` + `-exportArchive` recipe proven
# locally in Phase 31.3.c. Cloud Managed Apple Distribution signing
# means no .p12 in CI; just the App Store Connect API key (.p8) for
# the upload step.

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

jobs:
  upload:
    # `macos-latest` currently resolves to macos-14 with Xcode 16.4 (iOS
    # 18.5 SDK). Apple's TestFlight upload validation rejects anything
    # built with an SDK older than iOS 26 (Xcode 26+). Pin macos-26 so
    # we get Xcode 26 by default. If macos-26 is unavailable on this
    # repo's runner pool, fall back to setting `runs-on: macos-latest`
    # with an explicit `sudo xcode-select -s /Applications/Xcode_26.app`
    # step before the build.
    runs-on: macos-26
    timeout-minutes: 45

    env:
      XCODE_PROJECT: ios/Lightsei/Lightsei.xcodeproj
      XCODE_SCHEME: Lightsei
      XCODE_CONFIGURATION: Release
      ARCHIVE_PATH: ${{ github.workspace }}/build/Lightsei.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      TEAM_ID: 25ZQDZQ92C
      KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        # The .xcodeproj is generated from ios/Lightsei/project.yml and
        # not checked in (per .gitignore). Regenerate it from project.yml
        # on every CI run so build settings stay in lockstep with the
        # source-of-truth YAML.
        run: brew install xcodegen

      - name: Generate xcodeproj
        working-directory: ios/Lightsei
        run: xcodegen generate

      - name: Decode App Store Connect API key
        env:
          KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Bump build number to GITHUB_RUN_NUMBER
        working-directory: ios/Lightsei
        # TestFlight rejects duplicate build numbers for the same
        # marketing version, so each CI run needs a monotonic value.
        # GITHUB_RUN_NUMBER increments per workflow run and is unique
        # within the repo's lifetime.
        run: xcrun agvtool new-version -all "${GITHUB_RUN_NUMBER}"

      - name: Archive
        # `xcodebuild archive` with automatic signing has to fetch a
        # provisioning profile from Apple. On a CI runner with no
        # Apple ID logged in via Xcode, the only way to authenticate
        # is via the App Store Connect API key. The
        # `-authenticationKey*` flags are the xcodebuild-side equivalent
        # of the `authenticationKey*` keys in exportOptions.plist.
        run: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            archive

      - name: Export + upload to TestFlight
        run: |
          cat > /tmp/export-options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>upload</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>authenticationKeyPath</key>
            <string>${HOME}/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8</string>
            <key>authenticationKeyID</key>
            <string>${KEY_ID}</string>
            <key>authenticationKeyIssuerID</key>
            <string>${ISSUER_ID}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/export-options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Clean up API key
        if: always()
        run: rm -f ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
