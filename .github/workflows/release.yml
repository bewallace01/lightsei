name: Release SDK to PyPI

# Trigger on tags like v0.1.0, v0.2.0, v1.0.0-rc1, etc.
# Tagging from main is the explicit "release this" signal — regular pushes
# don't publish. To cut a release:
#
#   1. Bump `version` in sdk/pyproject.toml.
#   2. Commit + push.
#   3. git tag v0.1.0 && git push origin v0.1.0
#
# The workflow then builds the SDK, validates with twine, and uploads via
# PyPI's trusted-publishing OIDC flow (no API token to manage). The PyPI
# project must have github.com/bewallace01/lightsei + this workflow file
# registered as a trusted publisher.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build + twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches sdk version
        # Tag v0.1.0 must match version = "0.1.0" in sdk/pyproject.toml.
        # Catches the "tagged but forgot to bump" mistake before we ship a
        # version that doesn't exist on disk.
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('sdk/pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG does not match sdk/pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "tag $TAG matches package version $PKG_VERSION"

      - name: Build
        working-directory: sdk
        run: python -m build

      - name: Twine check
        working-directory: sdk
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is conventional for production releases. You can
    # add manual-approval rules to it via Settings → Environments if you want
    # a human gate before the actual upload. Optional but recommended once
    # someone other than the project owner can push tags.
    environment:
      name: pypi
      url: https://pypi.org/p/lightsei
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
