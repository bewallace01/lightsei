services:
  db:
    image: postgres:16-alpine
    container_name: lightsei-db
    environment:
      POSTGRES_USER: lightsei
      POSTGRES_PASSWORD: lightsei
      POSTGRES_DB: lightsei
    volumes:
      - lightsei_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightsei -d lightsei"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lightsei-backend
    ports:
      - "8000:8000"
    environment:
      - LIGHTSEI_DATABASE_URL=postgresql+psycopg://lightsei:lightsei@db:5432/lightsei
      # Master key for AES-256-GCM encryption of workspace secrets (e.g.
      # ANTHROPIC_API_KEY). Passed through from the host so the value isn't
      # checked in. Generate with:
      #   python -c "import secrets, base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
      # then export LIGHTSEI_SECRETS_KEY=... before `docker compose up` (or
      # drop it in a .env file next to this compose file).
      - LIGHTSEI_SECRETS_KEY=${LIGHTSEI_SECRETS_KEY:?LIGHTSEI_SECRETS_KEY is not set - generate one (see comment above) and export it or add it to .env}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        - NEXT_PUBLIC_LIGHTSEI_API_URL=http://localhost:8000
        - NEXT_PUBLIC_LIGHTSEI_API_KEY=demo-key
    container_name: lightsei-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_LIGHTSEI_API_URL=http://localhost:8000
      - NEXT_PUBLIC_LIGHTSEI_API_KEY=demo-key
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lightsei_pg:
