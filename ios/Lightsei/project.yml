name: Lightsei
options:
  bundleIdPrefix: com.lightsei
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Lightsei:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightsei.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # Custom URL scheme for deep-linking from the magic-link email
        # while we're pre-universal-links. Phase 29.2 adds the .well-known
        # /apple-app-site-association on app.lightsei.com which gives us
        # universal links + lets us drop this scheme.
        INFOPLIST_KEY_CFBundleURLTypes: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Lightsei
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.lightsei.app
            CFBundleURLSchemes:
              - lightsei
