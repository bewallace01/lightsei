name: Lightsei
options:
  bundleIdPrefix: com.lightsei
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Lightsei:
    type: application
    platform: iOS
    sources:
      - path: Sources
      # Asset catalog as a source entry (not resources/) so
      # xcodegen routes it through the actool compile phase + the
      # resulting Assets.car lands in the bundle. The resources/
      # entry alone added it as a folder reference but didn't
      # trigger the compile phase, so AccentColor + AppIcon
      # weren't actually shipping.
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightsei.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Launch screen background → AccentColor so the cold-launch
        # frame matches the in-app splash (indigo) instead of a
        # white flash. iOS reads UILaunchScreen.UIColorName from
        # the asset catalog at boot before our SwiftUI body runs.
        INFOPLIST_KEY_UILaunchScreen_UIColorName: AccentColor
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # Custom URL scheme for deep-linking from the magic-link email
        # while we're pre-universal-links. Phase 29.2 adds the .well-known
        # /apple-app-site-association on app.lightsei.com which gives us
        # universal links + lets us drop this scheme.
        INFOPLIST_KEY_CFBundleURLTypes: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Lightsei
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.lightsei.app
            CFBundleURLSchemes:
              - lightsei
    # Phase 29.2b: universal links. The `?mode=developer` query lets
    # the simulator bypass Apple's AASA verification (which would
    # otherwise need an Apple Developer Team ID + provisioning
    # profile). Drop the query when shipping to a real device after
    # the Developer account is set up + LIGHTSEI_APPLE_TEAM_ID is
    # populated on prod.
    entitlements:
      path: Resources/Lightsei.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:app.lightsei.com?mode=developer
